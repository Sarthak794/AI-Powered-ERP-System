<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Trainer Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom Trainer CSS -->
    <link rel="stylesheet" th:href="@{/css/trainer.css}">

</head>

<body class="bg-light trainer-app">

<!-- ================= HEADER ================= -->
<div class="trainer-header-wrapper">
    <div th:replace="~{fragments/trainer-header :: body}"></div>
</div>

<!-- ================= MAIN WRAPPER ================= -->
<div class="d-flex trainer-wrapper">

    <!-- SIDEBAR -->
    <aside class="trainer-sidebar-wrapper">

        <div class="trainer-sidebar-container">
            <div th:replace="~{fragments/trainer-sidebar :: body}"></div>
        </div>

    </aside>

    <!-- CONTENT -->
    <main class="trainer-content flex-grow-1">

        <div class="trainer-content-inner p-4">

            <!-- Dynamic Page Content -->
            <div th:replace="~{${content}}"></div>

        </div>

    </main>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
