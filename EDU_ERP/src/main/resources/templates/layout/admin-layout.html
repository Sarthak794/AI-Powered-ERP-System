<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Admin Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
          rel="stylesheet">

    <!-- Common CSS -->
    <link rel="stylesheet" th:href="@{/css/common.css}">

    <!-- Admin CSS -->
    <link rel="stylesheet" th:href="@{/css/admin/admin-layout.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-header.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-sidebar.css}">
	<link rel="stylesheet" th:href="@{/css/admin/placement-applications.css}">
	<link rel="stylesheet" th:href="@{/css/admin/attendance.css}">
	<link rel="stylesheet" th:href="@{/css/admin/batch-management.css}">
	<link rel="stylesheet" th:href="@{/css/admin/center-management.css}">
	<link rel="stylesheet" th:href="@{/css/admin/company-management.css}">
	<link rel="stylesheet" th:href="@{/css/admin/dashboard.css}">
	<link rel="stylesheet" th:href="@{/css/admin/user-management.css}">
	<link rel="stylesheet" th:href="@{/css/admin/exam-analytics.css}">
	<link rel="stylesheet" th:href="@{/css/admin/fee.css}">
	<link rel="stylesheet" th:href="@{/css/admin/student.css}">
	<link rel="stylesheet" th:href="@{/css/admin/trainer-management.css}">
	
		
	

</head>

<body class="admin-body">

<div class="admin-wrapper">

    <!-- ================= HEADER ================= -->
    <header class="admin-header-wrapper">
        <div th:replace="~{fragments/admin-header :: body}"></div>
    </header>

    <!-- ================= BODY ================= -->
    <div class="admin-container">

        <!-- Sidebar -->
        <aside class="admin-sidebar-wrapper">
            <div th:replace="~{fragments/admin-sidebar :: body}"></div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">

            <div class="admin-page">

                <div th:replace="${content}"></div>

            </div>

        </main>

    </div>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
