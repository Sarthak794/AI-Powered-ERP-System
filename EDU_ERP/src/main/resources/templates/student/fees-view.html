<div class="container-fluid py-4">

    <!-- Banner -->
    <div class="page-banner mb-4">

        <div class="d-flex justify-content-between align-items-center">

            <div>

                <h2 class="fw-bold mb-2">
                    My Fees
                </h2>

                <p class="mb-0 opacity-75">
                    Track your fee payments and pending balance
                </p>

            </div>

            <div class="banner-icon">
                💳
            </div>

        </div>

    </div>

    <!-- Summary Cards -->
    <div class="row g-4 mb-4">

        <div class="col-md-4">

            <div class="card dashboard-card h-100">

                <div class="card-body text-center">

                    <div class="metric-icon bg-soft-primary mb-3">
                        💰
                    </div>

                    <h6 class="text-muted">
                        Total Fees
                    </h6>

                    <h2 class="fw-bold text-primary">
                        ₹<span th:text="${total}"></span>
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card dashboard-card h-100">

                <div class="card-body text-center">

                    <div class="metric-icon bg-soft-success mb-3">
                        ✅
                    </div>

                    <h6 class="text-muted">
                        Paid Amount
                    </h6>

                    <h2 class="fw-bold text-success">
                        ₹<span th:text="${paid}"></span>
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card dashboard-card h-100">

                <div class="card-body text-center">

                    <div class="metric-icon bg-soft-warning mb-3">
                        ⏳
                    </div>

                    <h6 class="text-muted">
                        Pending Amount
                    </h6>

                    <h2 class="fw-bold text-warning">
                        ₹<span th:text="${pending}"></span>
                    </h2>

                </div>

            </div>

        </div>

    </div>

    <!-- Payment History -->
    <div class="card dashboard-card">

        <div class="card-header bg-white border-0 py-3">

            <h5 class="fw-bold mb-0">
                Payment History
            </h5>

        </div>

        <div class="card-body p-0">

            <div class="table-responsive">

                <table class="table table-hover align-middle mb-0">

                    <thead class="table-light">

                    <tr>

                        <th>Date</th>

                        <th>Amount</th>

                        <th>Payment Mode</th>

                        <th class="text-center">
                            Receipt
                        </th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="p : ${payments}">

                        <td th:text="${#temporals.format(p.paymentDate,'dd MMM yyyy')}">
                        </td>

                        <td>

                            <span class="fw-bold text-success">

                                ₹<span th:text="${p.amount}"></span>

                            </span>

                        </td>

                        <td>

                            <span class="badge bg-primary"
                                  th:text="${p.paymentMode}">
                            </span>

                        </td>

                        <td class="text-center">

                            <a th:href="@{/student/fees/receipt/{id}(id=${p.id})}"
                               class="btn btn-sm btn-outline-primary">

                                <i class="bi bi-download me-1"></i>

                                Receipt

                            </a>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(payments)}">

                        <td colspan="4"
                            class="text-center py-5 text-muted">

                            <i class="bi bi-receipt fs-1 d-block mb-3"></i>

                            No payment history available.

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>
