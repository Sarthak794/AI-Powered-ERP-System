<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Payment Failed</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/admin-header :: body}"></div>

<div class="d-flex">

    <div th:replace="~{fragments/student-sidebar :: body}"></div>

    <main class="flex-grow-1 p-4">

        <!-- ================= HEADER ================= -->

        <div class="notification-banner mb-4">

            <div class="row align-items-center">

                <div class="col-lg-8">

                    <h2 class="fw-bold mb-2">

                        <i class="fas fa-circle-xmark me-2"></i>

                        Payment Failed

                    </h2>

                    <p class="mb-0">

                        We couldn't verify your payment. Please review the details and try again.

                    </p>

                </div>

                <div class="col-lg-4 text-lg-end">

                    <i class="fas fa-credit-card fa-4x opacity-50"></i>

                </div>

            </div>

        </div>

        <!-- ================= ERROR CARD ================= -->

        <div class="card dashboard-card">

            <div class="card-body text-center py-5">

                <div class="metric-icon bg-soft-danger mb-4">

                    <i class="fas fa-times"></i>

                </div>

                <h2 class="fw-bold text-danger mb-3">

                    Payment Verification Failed

                </h2>

                <p class="text-muted fs-5 mb-4"
                   th:text="${error}">

                    Something went wrong while verifying your payment.

                </p>

                <div class="d-flex justify-content-center gap-3 flex-wrap">

                    <a href="/student/fees"
                       class="btn btn-primary px-4">

                        <i class="fas fa-arrow-left me-2"></i>

                        Back to Fees

                    </a>

                    <a href="/student/dashboard"
                       class="btn btn-outline-secondary px-4">

                        <i class="fas fa-home me-2"></i>

                        Dashboard

                    </a>

                </div>

            </div>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
