<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Documents</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <h2 class="mb-4">📁 Student Documents</h2>

    <!-- 🔽 Upload Section -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            Upload Document
        </div>

        <div class="card-body">
            <form th:action="@{/student/documents/upload}" method="post" enctype="multipart/form-data">

                <input type="hidden" name="studentId" th:value="${studentId}"/>

                <div class="row">

                    <div class="col-md-4">
                        <label>Document Type</label>
                        <select name="type" class="form-control" required>
                            <option value="">Select Type</option>
                            <option th:each="t : ${types}"
                                    th:value="${t}"
                                    th:text="${t}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label>Choose File</label>
                        <input type="file" name="file" class="form-control" required>
                    </div>

                    <div class="col-md-4 d-flex align-items-end">
                        <button class="btn btn-success w-100">
                            Upload
                        </button>
                    </div>

                </div>
            </form>
        </div>
    </div>

    <!-- 📋 Document List -->
    <div class="card">
        <div class="card-header bg-dark text-white">
            Uploaded Documents
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Type</th>
                    <th>File Name</th>
                    <th>Uploaded At</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="doc, iterStat : ${documents}">
                    <td th:text="${iterStat.count}"></td>

                    <td th:text="${doc.documentType}"></td>

                    <td th:text="${doc.document.fileName}"></td>

                    <td th:text="${doc.createdAt}"></td>

					<td>

					    <a th:href="@{/student/documents/view/{id}(id=${doc.id})}"
					       target="_blank"
					       class="btn btn-primary btn-sm">

					        View

					    </a>

					    <a th:href="@{/student/documents/download/{id}(id=${doc.id})}"
					       class="btn btn-success btn-sm">

					        Download

					    </a>

					    <a th:href="@{/student/documents/delete/{id}(id=${doc.id},studentId=${studentId})}"
					       class="btn btn-danger btn-sm">

					        Delete

					    </a>

					</td>
                </tr>

                <tr th:if="${#lists.isEmpty(documents)}">
                    <td colspan="5" class="text-center text-muted">
                        No documents uploaded
                    </td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
