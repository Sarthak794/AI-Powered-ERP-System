<div class="qual-page container-fluid mt-4">

    <!-- HEADER -->
    <div class="page-header mb-4">
        <h3>Qualification Management</h3>
        <p>Manage all academic qualifications</p>
    </div>

    <!-- ALERTS -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- CREATE CARD -->
    <div class="ui-card mb-4">

        <form th:action="@{/admin/qualifications/create}" method="post" class="qual-form">

            <input class="form-control"
                   name="name"
                   placeholder="Enter Qualification Name"
                   required>

            <button class="btn-primary-action">
                + Add Qualification
            </button>

        </form>

    </div>

    <!-- TABLE CARD -->
    <div class="ui-card">

        <div class="table-responsive">

            <table class="table modern-table">

                <thead class="modern-thead">
                <tr>
                    <th>ID</th>
                    <th>Qualification Name</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="q : ${qualifications}">
                    <td>#<span th:text="${q.id}"></span></td>
                    <td class="fw-semibold" th:text="${q.name}"></td>
                    <td>

                        <form th:action="@{/admin/qualifications/delete/{id}(id=${q.id})}"
                              method="post"
                              class="d-inline">

                            <button class="btn-danger-action"
                                    onclick="return confirm('Delete this qualification?')">
                                Delete
                            </button>

                        </form>

                    </td>
                </tr>
                </tbody>

            </table>

        </div>

    </div>

</div>
