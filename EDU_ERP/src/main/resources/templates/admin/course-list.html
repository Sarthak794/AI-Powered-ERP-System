<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Course Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: body}"></div>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: body}"></div>

    <div class="p-4 w-100">
        <h3>Course Master</h3>

        <form th:action="@{/admin/courses/save}" method="post"
              class="row g-2 mb-4">

            <div class="col-md-5">
                <input type="text" th:field="${course.name}"
                       class="form-control" placeholder="Course Name" required>
            </div>

            <div class="col-md-3">
                <input type="number" th:field="${course.durationMonths}"
                       class="form-control" placeholder="Duration (Months)" required>
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100">Add</button>
            </div>
        </form>

        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Duration</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${courses}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.name}"></td>
                    <td th:text="${c.durationMonths + ' months'}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
