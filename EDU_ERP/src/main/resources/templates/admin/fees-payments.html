<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fee Payments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: body}"></div>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: body}"></div>

    <div class="p-4 w-100">
        <h3 th:text="${student.user.fullName} + ' - Fees'"></h3>

        <div class="mb-3">
            <b>Total Fees:</b> ₹<span th:text="${student.batch.course.totalFees}"></span><br>
            <b>Paid:</b> ₹<span th:text="${paid}"></span><br>
            <b>Pending:</b> ₹<span th:text="${pending}"></span>
        </div>

        <table class="table table-bordered">
            <thead class="table-dark">
            <tr>
                <th>Date</th>
                <th>Amount</th>
                <th>Mode</th>
				<th>Receipt</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${payments}">
                <td th:text="${p.paymentDate}"></td>
                <td th:text="${p.amount}"></td>
                <td th:text="${p.paymentMode}"></td>
				<td>
				    <a th:href="@{/admin/fees/receipt/{id}(id=${p.id})}"
				       class="btn btn-sm btn-outline-primary">
				        Download
				    </a>
				</td>

            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
