<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reports</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div th:replace="~{fragments/header :: body}"></div>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div th:replace="~{fragments/sidebar :: body}"></div>

    <!-- MAIN CONTENT -->
    <div class="p-4 w-100">

        <h3 class="mb-4">Reports</h3>

        <div class="row g-3">

            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6>Total Revenue</h6>
                        <h4>₹ <span th:text="${totalRevenue}"></span></h4>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6>Total Students</h6>
                        <h4 th:text="${totalStudents}"></h4>
                    </div>
                </div>
            </div>

        </div>

        <hr class="my-4">

        <div class="alert alert-info">
            📊 Detailed reports (fees, students, batches) coming next.
        </div>

    </div>
</div>

</body>
</html>
