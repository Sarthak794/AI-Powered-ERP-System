<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: body}"></div>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: body}"></div>

    <div class="p-4 w-100">

        <h3 class="mb-3">Employee Master</h3>

        <!-- ADD EMPLOYEE -->
        <form th:action="@{/admin/employees/save}" method="post" class="row g-2 mb-4">

            <div class="col-md-3">
                <input type="text" name="fullName" class="form-control"
                       placeholder="Employee Name" required>
            </div>

            <div class="col-md-3">
                <input type="email" name="email" class="form-control"
                       placeholder="Email" required>
            </div>

            <div class="col-md-2">
                <input type="password" name="password" class="form-control"
                       placeholder="Password" required>
            </div>

            <div class="col-md-2">
                <select name="roleNames" class="form-select" multiple required>
                    <option th:each="r : ${roles}"
                            th:value="${r.roleName}"
                            th:text="${r.roleName}">
                    </option>
                </select>
            </div>

            <div class="col-md-2">
                <select name="centerId" class="form-select" required>
                    <option value="">Select Center</option>
                    <option th:each="c : ${centers}"
                            th:value="${c.id}"
                            th:text="${c.name}">
                    </option>
                </select>
            </div>

            <div class="col-md-2">
                <input type="text" name="designation" class="form-control"
                       placeholder="Designation" required>
            </div>

            <div class="col-md-2">
                <input type="number" step="0.01" name="salary"
                       class="form-control" placeholder="Salary" required>
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100">Add</button>
            </div>

        </form>

        <!-- EMPLOYEE TABLE -->
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Center</th>
                    <th>Designation</th>
                    <th>Roles</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="e : ${employees}">
                    <td th:text="${e.id}"></td>
                    <td th:text="${e.user.fullName}"></td>
                    <td th:text="${e.user.email}"></td>
                    <td th:text="${e.center.name}"></td>
                    <td th:text="${e.designation}"></td>
                    <td>
                        <span th:each="r : ${e.user.roles}"
                              th:text="${r.roleName + ' '}"></span>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>
</div>

</body>
</html>
