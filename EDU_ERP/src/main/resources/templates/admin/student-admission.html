<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Admission</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: body}"></div>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: body}"></div>

    <div class="p-4 w-100">
        <h3 class="mb-3">Student Admission</h3>

        <form th:action="@{/admin/admissions/save}" method="post" class="row g-3">

            <!-- User Info -->
            <div class="col-md-4">
                <input type="text" name="fullName" class="form-control"
                       placeholder="Student Name" required>
            </div>

            <div class="col-md-4">
                <input type="email" name="email" class="form-control"
                       placeholder="Email" required>
            </div>

            <div class="col-md-4">
                <input type="password" name="password" class="form-control"
                       placeholder="Password" required>
            </div>

            <!-- Academic Info -->
            <div class="col-md-4">
                <select name="qualificationId" class="form-select" required>
                    <option value="">Select Qualification</option>
                    <option th:each="q : ${qualifications}"
                            th:value="${q.id}"
                            th:text="${q.name}">
                    </option>
                </select>
            </div>

            <div class="col-md-4">
                <select name="specializationId" class="form-select" required>
                    <option value="">Select Specialization</option>
                    <option th:each="s : ${specializations}"
                            th:value="${s.id}"
                            th:text="${s.name}">
                    </option>
                </select>
            </div>

            <div class="col-md-4">
                <select name="centerId" class="form-select" required>
                    <option value="">Select Center</option>
                    <option th:each="c : ${centers}"
                            th:value="${c.id}"
                            th:text="${c.name}">
                    </option>
                </select>
            </div>

            <div class="col-md-3">
                <button class="btn btn-primary w-100">
                    Admit Student
                </button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
