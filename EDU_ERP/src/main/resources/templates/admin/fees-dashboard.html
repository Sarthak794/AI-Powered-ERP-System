<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fees Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: body}"></div>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: body}"></div>

    <div class="p-4 w-100">
        <h3>Student Fees</h3>

        <table class="table table-bordered">
            <thead class="table-dark">
            <tr>
                <th>Student</th>
                <th>Batch</th>
                <th>Course</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${students}">
                <td th:text="${s.user.fullName}"></td>
                <td th:text="${s.batch.name}"></td>
                <td th:text="${s.batch.course.name}"></td>
                <td>
                    <a th:href="@{/admin/fees/payments/{id}(id=${s.id})}"
                       class="btn btn-sm btn-primary">
                        View Payments
                    </a>
                </td>
				<td>				<a th:href="@{/admin/reports/fees/csv}"
				   class="btn btn-outline-primary btn-sm">
				    ⬇ Export Fees (CSV)
				</a>
</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
