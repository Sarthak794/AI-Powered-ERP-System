<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mark Attendance</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<!-- HEADER -->
<div th:replace="~{fragments/header :: body}"></div>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div th:replace="~{fragments/sidebar :: body}"></div>

    <!-- CONTENT -->
    <div class="p-4 w-100">

        <h4 class="mb-3">
            Attendance –
            <span th:text="${batch != null ? batch.name : 'Unknown Batch'}"></span>
            |
            <span th:text="${date}"></span>
        </h4>

        <form th:action="@{/admin/attendance/save}" method="post">

            <!-- hidden fields -->
            <input type="hidden" name="batchId" th:value="${batch.id}">
            <input type="hidden" name="date" th:value="${date}">

            <table class="table table-bordered">
                <thead class="table-light">
                <tr>
                    <th>Student Name</th>
                    <th>Present</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${students.isEmpty()}">
                    <td colspan="2" class="text-center text-muted">
                        No students found in this batch
                    </td>
                </tr>

                <tr th:each="s : ${students}">
                    <td th:text="${s.user.fullName}"></td>
                    <td class="text-center">
                        <input type="checkbox"
                               class="form-check-input"
                               name="presentStudentIds"
                               th:value="${s.id}">
                    </td>
                </tr>
                </tbody>
            </table>

            <button class="btn btn-success">
                Save Attendance
            </button>

            <a th:href="@{/admin/attendance}"
               class="btn btn-secondary ms-2">
                Back
            </a>

        </form>

    </div>
</div>

</body>
</html>
