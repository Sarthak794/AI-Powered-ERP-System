<div class="container-fluid py-4 exam-analytics-page">

    <!-- ================= HEADER ================= -->
    <div class="dashboard-header mb-4">
        <div>
            <h2 class="page-title">
                <i class="fas fa-chart-line me-2"></i>
                Exam Analytics
            </h2>
            <p class="page-subtitle">
                Performance overview of all conducted examinations
            </p>
        </div>
    </div>

    <!--  TABLE CARD  -->

    <div class="dashboard-card mb-4">

        <div class="card-header-custom">

            <h5>
                <i class="fas fa-table me-2"></i>
                Exam Statistics
            </h5>

        </div>

        <div class="table-responsive">

            <table class="table table-hover align-middle analytics-table mb-0">

                <thead>

                <tr>
                    <th>Exam</th>
                    <th>Attempted</th>
                    <th>Not Attempted</th>
                    <th>Average</th>
                    <th>Highest</th>
                    <th>Lowest</th>
                </tr>

                </thead>

                <tbody>

                <tr th:if="${analytics==null || #lists.isEmpty(analytics)}">
                    <td colspan="6" class="text-center py-5 text-muted">
                        <i class="fas fa-folder-open fa-2x mb-3"></i>
                        <br>
                        No Analytics Available
                    </td>
                </tr>

                <tr th:each="a : ${analytics}">

                    <td>
                        <span class="fw-semibold"
                              th:text="${a.exam}">
                        </span>
                    </td>

                    <td>
                        <span class="badge bg-success text-white"
                              th:text="${a.attempted}">
                        </span>
                    </td>

                    <td>
                        <span class="badge bg-danger text-white"
                              th:text="${a.notAttempted}">
                        </span>
                    </td>

                    <td class="fw-semibold text-primary"
                        th:text="${a.average}">
                    </td>

                    <td class="text-success fw-bold"
                        th:text="${a.max}">
                    </td>

                    <td class="text-danger fw-bold"
                        th:text="${a.min}">
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

    <!-- ================= CHART ================= -->

    <div class="dashboard-card">

        <div class="card-header-custom">

            <h5>
                <i class="fas fa-chart-bar me-2"></i>
                Attempt Distribution
            </h5>

        </div>

        <div style="height:420px">

            <canvas id="examChart"></canvas>

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">

const labels = /*[[${analytics.![exam]}]]*/ [];
const attempted = /*[[${analytics.![attempted]}]]*/ [];
const notAttempted = /*[[${analytics.![notAttempted]}]]*/ [];

new Chart(document.getElementById("examChart"),{

    type:"bar",

    data:{

        labels:labels,

        datasets:[

            {
                label:"Attempted",
                data:attempted,
                backgroundColor:"#22c55e",
                borderRadius:8
            },

            {
                label:"Not Attempted",
                data:notAttempted,
                backgroundColor:"#ef4444",
                borderRadius:8
            }

        ]

    },

    options:{

        responsive:true,
        maintainAspectRatio:false,

        plugins:{

            legend:{
                position:"top"
            }

        },

        scales:{

            y:{
                beginAtZero:true,
                grid:{
                    color:"#e5e7eb"
                }
            },

            x:{
                grid:{
                    display:false
                }
            }

        }

    }

});

</script>
