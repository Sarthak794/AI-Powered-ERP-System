<div class="container-fluid py-4">

    <!-- ================= HEADER ================= -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">

        <div>
            <h2 class="fw-bold mb-1">Edit Exam</h2>
            <p class="text-muted mb-0">
                Update exam details and manage questions
            </p>
        </div>

        <a th:href="@{/trainer/exams}"
           class="btn ui-btn ui-btn-secondary">
            <i class="bi bi-arrow-left me-1"></i>
            Back
        </a>

    </div>

    <!-- ================= EXAM DETAILS ================= -->
    <div class="ui-panel mb-4">

        <div class="ui-panel-header">
            Exam Information
        </div>

        <div class="ui-panel-body">

            <form th:action="@{/trainer/exams/{id}/edit(id=${exam.id})}"
                  method="post"
                  class="row g-3">

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Exam Title</label>
                    <input type="text"
                           name="title"
                           class="form-control"
                           th:value="${exam.title}"
                           required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Batch</label>
                    <select name="batchId" class="form-select" required>
                        <option value="">Select Batch</option>
                        <option th:each="b:${batches}"
                                th:value="${b.id}"
                                th:text="${b.name}"
                                th:selected="${exam.batch.id == b.id}">
                        </option>
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea name="description"
                              class="form-control"
                              rows="3"
                              th:text="${exam.description}">
                    </textarea>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Duration</label>
                    <input type="number"
                           name="durationMinutes"
                           class="form-control"
                           th:value="${exam.durationMinutes}">
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Total Marks</label>
                    <input type="number"
                           name="totalMarks"
                           class="form-control"
                           th:value="${exam.totalMarks}">
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Start Date</label>
                    <input type="date"
                           name="startDate"
                           class="form-control"
                           th:value="${exam.startDate}">
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">End Date</label>
                    <input type="date"
                           name="endDate"
                           class="form-control"
                           th:value="${exam.endDate}">
                </div>

                <div class="col-12 d-flex justify-content-end gap-2 mt-2">

                    <a th:href="@{/trainer/exams}"
                       class="btn ui-btn ui-btn-secondary">
                        Cancel
                    </a>

                    <button class="btn ui-btn ui-btn-primary">
                        <i class="bi bi-save me-1"></i>
                        Update Exam
                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- ================= QUESTIONS ================= -->
    <div class="ui-panel">

        <div class="ui-panel-header d-flex justify-content-between align-items-center">

            <span>Questions</span>

            <a th:href="@{/trainer/exams/{id}/questions(id=${exam.id})}"
               class="btn ui-btn ui-btn-success btn-sm">
                <i class="bi bi-plus-circle me-1"></i>
                Add Question
            </a>

        </div>

        <div class="ui-panel-body">

            <div th:each="q,stat:${exam.questions}"
                 class="border rounded p-3 mb-4">

                <h6 class="fw-bold mb-3">
                    Question [[${stat.index + 1}]]
                </h6>

                <!-- UPDATE QUESTION -->
                <form th:action="@{/trainer/questions/{id}/update(id=${q.id})}"
                      method="post"
                      class="row g-3">

                    <div class="col-12">
                        <label class="form-label">Question</label>
                        <textarea class="form-control"
                                  name="text"
                                  rows="2"
                                  th:text="${q.text}">
                        </textarea>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Marks</label>
                        <input class="form-control"
                               name="marks"
                               type="number"
                               th:value="${q.marks}">
                    </div>

                    <div class="col-md-3">
                        <label>Option A</label>
                        <input class="form-control"
                               name="optionA"
                               th:value="${q.options[0].text}">
                    </div>

                    <div class="col-md-3">
                        <label>Option B</label>
                        <input class="form-control"
                               name="optionB"
                               th:value="${q.options[1].text}">
                    </div>

                    <div class="col-md-3">
                        <label>Option C</label>
                        <input class="form-control"
                               name="optionC"
                               th:value="${q.options[2].text}">
                    </div>

                    <div class="col-md-3">
                        <label>Option D</label>
                        <input class="form-control"
                               name="optionD"
                               th:value="${q.options[3].text}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Correct Answer</label>
                        <select class="form-select" name="correctOption">

                            <option value="A" th:selected="${q.options[0].correct}">A</option>
                            <option value="B" th:selected="${q.options[1].correct}">B</option>
                            <option value="C" th:selected="${q.options[2].correct}">C</option>
                            <option value="D" th:selected="${q.options[3].correct}">D</option>

                        </select>
                    </div>

                    <div class="col-12 d-flex gap-2">

                        <button class="btn ui-btn ui-btn-primary">
                            <i class="bi bi-save me-1"></i>
                            Update
                        </button>

                </form>

                <!-- DELETE -->
                <form th:action="@{/trainer/questions/{id}/delete(id=${q.id})}"
                      method="post">

                    <button class="btn ui-btn ui-btn-danger">
                        <i class="bi bi-trash me-1"></i>
                        Delete
                    </button>

                </form>

                    </div>

            </div>

        </div>

    </div>

</div>
