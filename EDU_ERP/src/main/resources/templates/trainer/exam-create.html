<div class="container-fluid py-4">

    <!-- ================= HEADER ================= -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">

        <div>
            <h2 class="fw-bold mb-1">Create Exam</h2>
            <p class="text-muted mb-0">
                Set up new assessments for batches
            </p>
        </div>

        <span class="badge bg-primary px-3 py-2 fs-6">
            Exam Module
        </span>

    </div>

    <!-- ================= FORM PANEL ================= -->
    <div class="ui-panel">

        <div class="ui-panel-header">
            Exam Details
        </div>

        <div class="ui-panel-body">

            <form th:action="@{/trainer/exams/create}" method="post" class="row g-3">

                <!-- Title -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Exam Title</label>
                    <input class="form-control" name="title" placeholder="Enter exam title" required>
                </div>

                <!-- Batch -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Select Batch</label>
                    <select class="form-select" name="batchId" required>
                        <option disabled selected>Select Batch</option>
                        <option th:each="b : ${batches}"
                                th:value="${b.id}"
                                th:text="${b.name}">
                        </option>
                    </select>
                </div>

                <!-- Start Date -->
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Start Date</label>
                    <input type="date" class="form-control" name="startDate" required>
                </div>

                <!-- End Date -->
                <div class="col-md-3">
                    <label class="form-label fw-semibold">End Date</label>
                    <input type="date" class="form-control" name="endDate" required>
                </div>

                <!-- Duration -->
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Duration (Minutes)</label>
                    <input type="number" class="form-control" name="durationMinutes" placeholder="e.g. 60" required>
                </div>

                <!-- Total Marks -->
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Total Marks</label>
                    <input type="number" class="form-control" name="totalMarks" placeholder="e.g. 100" required>
                </div>

                <!-- Description -->
                <div class="col-md-12">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea class="form-control"
                              name="description"
                              rows="3"
                              placeholder="Optional description..."></textarea>
                </div>

                <!-- Submit -->
                <div class="col-md-3">
                    <button class="btn ui-btn ui-btn-success w-100">
                        Create Exam
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>
