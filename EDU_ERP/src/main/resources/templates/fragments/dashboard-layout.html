<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">

    <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
</nav>

        <main class="col-md-10 p-4">
