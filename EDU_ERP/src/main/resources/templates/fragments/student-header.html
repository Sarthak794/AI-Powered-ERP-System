<div th:fragment="body">

<nav class="navbar navbar-expand-lg student-navbar shadow-sm">

    <div class="container-fluid">

        <!-- ================================= -->
        <!-- LEFT -->
        <!-- ================================= -->

        <a class="navbar-brand fw-bold"
           th:href="@{/student/dashboard}">

            <i class="bi bi-mortarboard-fill me-2"></i>

            SR Education ERP

        </a>

        <!-- ================================= -->
        <!-- SEARCH -->
        <!-- ================================= -->

        <form class="d-none d-lg-flex mx-auto"
              style="width:420px;">

            <div class="input-group">

                <span class="input-group-text bg-white border-end-0">

                    <i class="bi bi-search"></i>

                </span>

                <input class="form-control border-start-0"

                       placeholder="Search...">

            </div>

        </form>

        <!-- ================================= -->
        <!-- RIGHT -->
        <!-- ================================= -->

        <div class="d-flex align-items-center gap-3">
			            <!-- ============================= -->
			            <!-- DATE & TIME -->
			            <!-- ============================= -->

			            <div class="d-none d-xl-block text-end">

			                <small class="text-muted d-block">
			                    Today
			                </small>

			                <span id="currentDateTime"
			                      class="fw-semibold">
			                </span>

			            </div>

			            <!-- ============================= -->
			            <!-- NOTIFICATION -->
			            <!-- ============================= -->

			            <a th:href="@{/student/notifications}"
			               class="btn btn-light position-relative rounded-circle p-2">

			                <i class="bi bi-bell fs-5"></i>

			                <span th:if="${unreadCount != null && unreadCount > 0}"
			                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
			                      th:text="${unreadCount}">
			                </span>

			            </a>

			            <!-- ============================= -->
			            <!-- PROFILE DROPDOWN -->
			            <!-- ============================= -->

			            <div class="dropdown">

			                <a class="d-flex align-items-center text-decoration-none dropdown-toggle"
			                   href="#"
			                   data-bs-toggle="dropdown">

			                    <img th:if="${student != null && student.profilePhoto != null}"
			                         th:src="@{'/uploads/profile/' + ${student.profilePhoto}}"
			                         class="rounded-circle border shadow-sm"
			                         width="45"
			                         height="45"
			                         style="object-fit:cover;">

			                    <img th:if="${student == null || student.profilePhoto == null}"
			                         src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
			                         class="rounded-circle border shadow-sm"
			                         width="45"
			                         height="45">

			                    <div class="ms-2 text-start d-none d-md-block">

			                        <div class="fw-bold"
			                             th:text="${student != null ? student.fullName : 'Student'}">
			                        </div>

			                        <small class="text-muted">
			                            Student
			                        </small>

			                    </div>

			                </a>

			                <ul class="dropdown-menu dropdown-menu-end shadow border-0">

			                    <li>

			                        <a class="dropdown-item"
			                           th:href="@{/student/profile}">

			                            <i class="bi bi-person me-2"></i>

			                            My Profile

			                        </a>

			                    </li>

			                    <li>

			                        <a class="dropdown-item"
			                           th:href="@{/student/profile/edit}">

			                            <i class="bi bi-pencil-square me-2"></i>

			                            Edit Profile

			                        </a>

			                    </li>

			                    <li>

			                        <a class="dropdown-item"
			                           th:href="@{/student/resume}">

			                            <i class="bi bi-file-earmark-arrow-up me-2"></i>

			                            Resume

			                        </a>

			                    </li>

			                    <li><hr class="dropdown-divider"></li>

			                    <li>

			                        <a class="dropdown-item text-danger"
			                           th:href="@{/logout}">

			                            <i class="bi bi-box-arrow-right me-2"></i>

			                            Logout

			                        </a>

			                    </li>

			                </ul>

			            </div>

			        </div>

			    </div>

			</nav>
			<!-- ========================================= -->
			<!-- LIVE DATE & TIME -->
			<!-- ========================================= -->

			<script>

			function updateDateTime() {

			    const now = new Date();

			    const options = {
			        weekday: "short",
			        day: "numeric",
			        month: "short",
			        year: "numeric"
			    };

			    const date =
			        now.toLocaleDateString("en-IN", options);

			    const time =
			        now.toLocaleTimeString("en-IN", {
			            hour: "2-digit",
			            minute: "2-digit"
			        });

			    document.getElementById("currentDateTime")
			            .innerHTML =
			            date + "<br><small>" + time + "</small>";

			}

			updateDateTime();

			setInterval(updateDateTime,1000);

			</script>

			</div>
