<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Batch Mapping</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: body}"></div>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: body}"></div>

    <div class="p-4 w-100">

        <h3>Assign Student to Batch</h3>

        <table class="table table-bordered">
            <thead class="table-dark">
            <tr>
                <th>Student</th>
                <th>Current Batch</th>
                <th>Assign</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="s : ${students}">
                <td th:text="${s.user.fullName}"></td>
                <td th:text="${s.batch != null ? s.batch.name : 'Not Assigned'}"></td>
                <td>
                    <form th:action="@{/admin/student-batch/assign}" method="post"
                          class="d-flex gap-2">

                        <input type="hidden" name="studentId" th:value="${s.id}"/>

                        <select name="batchId" class="form-select" required>
                            <option value="">Select Batch</option>
                            <option th:each="b : ${batches}"
                                    th:value="${b.id}"
                                    th:text="${b.name}">
                            </option>
                        </select>

                        <button class="btn btn-primary btn-sm">
                            Assign
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

    </div>
</div>

</body>
</html>
