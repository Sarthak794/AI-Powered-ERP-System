<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:replace="~{fragments/header :: body}"></div>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: body}"></div>

    <div class="p-4 w-100">

        <h3 class="mb-4">Attendance Summary (Per Student)</h3>

        <!-- FILTER -->
        <form method="post" class="row g-3 mb-4">

            <div class="col-md-4">
                <label class="form-label">Batch</label>
                <select name="batchId" class="form-select" required>
                    <option value="">Select Batch</option>
                    <option th:each="b : ${batches}"
                            th:value="${b.id}"
                            th:text="${b.name}"
                            th:selected="${b.id == batchId}">
                    </option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">From</label>
                <input type="date" name="from"
                       th:value="${from}"
                       class="form-control" required>
            </div>

            <div class="col-md-3">
                <label class="form-label">To</label>
                <input type="date" name="to"
                       th:value="${to}"
                       class="form-control" required>
            </div>

            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-primary w-100">
                    View
                </button>
            </div>
        </form>

        <!-- EXPORT BUTTONS -->
        <div class="mb-3" th:if="${summary != null}">
            <a th:href="@{/admin/attendance/export/excel(
                    batchId=${batchId},
                    from=${from},
                    to=${to})}"
               class="btn btn-outline-success me-2">
                Export Excel
            </a>

            <a th:href="@{/admin/attendance/export/pdf(
                    batchId=${batchId},
                    from=${from},
                    to=${to})}"
               class="btn btn-outline-danger">
                Export PDF
            </a>
        </div>

        <!-- TABLE -->
        <table class="table table-bordered"
               th:if="${summary != null}">

            <thead class="table-light">
                <tr>
                    <th>Student</th>
                    <th>Total</th>
                    <th>Present</th>
                    <th>Absent</th>
                    <th>Attendance %</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="s : ${summary}">
                    <td th:text="${s.studentName}"></td>
                    <td th:text="${s.total}"></td>
                    <td th:text="${s.present}"></td>
                    <td th:text="${s.absent}"></td>
                    <td>
                        <span class="fw-semibold"
                              th:text="${#numbers.formatDecimal(s.percentage,1,2)} + '%'">
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>
</div>

</body>
</html>
