<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Location Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<!-- Header -->
<div th:replace="~{fragments/header :: body}"></div>

<div class="d-flex">
    <!-- Sidebar -->
    <div th:replace="fragments/sidebar :: body"></div>

    <div class="p-4 w-100">

        <h3 class="mb-3">Location Master</h3>

        <!-- Add Location -->
        <form th:action="@{/admin/locations/save}" method="post" class="row g-2 mb-4">

            <div class="col-md-4">
                <select class="form-select" th:field="${location.city.id}" required>
                    <option value="">-- Select City --</option>
                    <option th:each="c : ${cities}"
                            th:value="${c.id}"
                            th:text="${c.name + ' (' + c.state.name + ')'}">
                    </option>
                </select>
            </div>

            <div class="col-md-4">
                <input type="text"
                       th:field="${location.name}"
                       class="form-control"
                       placeholder="Enter location name"
                       required>
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100">Add</button>
            </div>
        </form>

        <!-- Location Table -->
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Location</th>
                    <th>City</th>
                    <th>State</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="l : ${locations}">
                    <td th:text="${l.id}"></td>
                    <td th:text="${l.name}"></td>
                    <td th:text="${l.city.name}"></td>
                    <td th:text="${l.city.state.name}"></td>
                    <td>
                        <a th:href="@{/admin/locations/delete/{id}(id=${l.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete location?')">
                           Delete
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>
</div>

</body>
</html>
