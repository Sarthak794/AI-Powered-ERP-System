<div class="container-fluid">

    <h3 class="fw-bold mb-4">Payment History</h3>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">

            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Student</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Collected By</th>
                    <th>Receipt</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="p : ${payments}">
                    <td th:text="${p.student.fullName}"></td>
                    <td>₹ <span th:text="${p.amount}"></span></td>
                    <td th:text="${p.paidAt}"></td>
                    <td th:text="${p.accountant.username}"></td>
                    <td>
                        <a th:href="@{/accountant/payments/{id}/receipt(id=${p.id})}"
                           class="btn btn-sm btn-outline-primary">
                            PDF
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(payments)}">
                    <td colspan="5"
                        class="text-center text-muted py-4">
                        No payments recorded
                    </td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>
