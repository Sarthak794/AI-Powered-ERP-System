<div class="container-fluid py-4">

    <!-- ================= HEADER ================= -->
    <div class="erp-header mb-4">

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

            <div>
                <h2 class="fw-bold mb-1">My Batches</h2>
                <p class="text-muted mb-0">
                    Manage all your assigned training batches
                </p>
            </div>

            <span class="badge erp-badge">
                Total: <span th:text="${#lists.size(batches)}"></span>
            </span>

        </div>

    </div>

    <!-- ================= BATCH GRID ================= -->
    <div class="row g-4">

        <div class="col-xl-4 col-md-6" th:each="batch : ${batches}">

            <div class="batch-card">

                <!-- HEADER -->
                <div class="batch-card-header">

                    <div>
                        <h5 class="mb-1 fw-bold"
                            th:text="${batch.batchName}">
                            Batch Name
                        </h5>

                        <small class="text-muted">
                            Active Training Batch
                        </small>
                    </div>

                    <span class="batch-badge">
                        Active
                    </span>

                </div>

                <!-- BODY -->
                <div class="batch-card-body">

                    <div class="batch-info">
                        <span>Center</span>
                        <strong th:text="${batch.centerName}"></strong>
                    </div>

                    <div class="batch-info">
                        <span>Qualification</span>
                        <strong th:text="${batch.qualificationName}"></strong>
                    </div>

                    <div class="batch-info">
                        <span>Specialization</span>
                        <strong th:text="${batch.specializationName}"></strong>
                    </div>

                    <div class="batch-stats">

                        <div>
                            <h6 th:text="${batch.studentCount}">0</h6>
                            <small>Students</small>
                        </div>

                        <div>
                            <h6 th:text="${batch.examCount}">0</h6>
                            <small>Exams</small>
                        </div>

                    </div>

                </div>

                <!-- ACTIONS -->
                <div class="batch-card-footer">

                    <a class="btn btn-sm btn-primary"
                       th:href="@{/trainer/batches/{id}/students(id=${batch.batchId})}">
                        Students
                    </a>

                    <a class="btn btn-sm btn-success"
                       th:href="@{/trainer/batches/{id}/performance(id=${batch.batchId})}">
                        Performance
                    </a>

                    <a class="btn btn-sm btn-warning text-white"
                       th:href="@{/trainer/attendance/batch/{id}(id=${batch.batchId})}">
                        Attendance
                    </a>

                    <a class="btn btn-sm btn-info text-white"
                       th:href="@{/trainer/exams/create(batchId=${batch.batchId})}">
                        Exams
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>
