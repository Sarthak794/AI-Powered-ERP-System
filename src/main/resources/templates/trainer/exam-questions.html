<div class="container-fluid py-4">

    <!-- ================= HEADER ================= -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h3 class="fw-bold mb-1">
                Add Questions – <span class="text-primary" th:text="${exam.title}"></span>
            </h3>

            <p class="text-muted mb-0">
                Create MCQ questions with options and correct answers
            </p>
        </div>

        <a th:href="@{/trainer/exams/{id}/edit(id=${exam.id})}"
           class="btn btn-outline-secondary">

            <i class="bi bi-arrow-left me-1"></i>
            Back

        </a>

    </div>


    <!-- ================= FORM PANEL ================= -->
    <div class="erp-panel">

        <div class="erp-panel-header">
            <h5 class="fw-bold mb-0">
                Question Details
            </h5>
        </div>


        <div class="erp-panel-body">

            <form th:action="@{/trainer/exams/{id}/questions(id=${exam.id})}"
                  method="post"
                  enctype="multipart/form-data">


                <!-- QUESTION TEXT -->
                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Question Text
                    </label>

                    <textarea class="form-control"
                              name="questionText"
                              rows="3"
                              placeholder="Enter your question..."
                              required></textarea>

                </div>


                <!-- MARKS + IMAGE -->
                <div class="row g-3 mb-3">

                    <div class="col-md-6">

                        <label class="form-label fw-semibold">
                            Marks
                        </label>

                        <input class="form-control"
                               type="number"
                               name="marks"
                               placeholder="Enter marks"
                               required>

                    </div>


                    <div class="col-md-6">

                        <label class="form-label fw-semibold">
                            Question Image (Optional)
                        </label>

                        <input class="form-control"
                               type="file"
                               name="questionImage"
                               accept="image/*">

                    </div>

                </div>


                <!-- OPTIONS -->
                <div class="row g-3 mb-3">

                    <div class="col-md-6">
                        <input class="form-control"
                               name="optionA"
                               placeholder="Option A">
                    </div>

                    <div class="col-md-6">
                        <input class="form-control"
                               name="optionB"
                               placeholder="Option B">
                    </div>

                    <div class="col-md-6">
                        <input class="form-control"
                               name="optionC"
                               placeholder="Option C">
                    </div>

                    <div class="col-md-6">
                        <input class="form-control"
                               name="optionD"
                               placeholder="Option D">
                    </div>

                </div>


                <!-- CORRECT OPTION -->
                <div class="mb-4">

                    <label class="form-label fw-semibold">
                        Correct Answer
                    </label>

                    <select class="form-select"
                            name="correctOption"
                            required>

                        <option value="A">Option A</option>
                        <option value="B">Option B</option>
                        <option value="C">Option C</option>
                        <option value="D">Option D</option>

                    </select>

                </div>


                <!-- ACTION BUTTON -->
                <div class="d-flex justify-content-end">

                    <button class="btn btn-primary px-4">

                        <i class="bi bi-plus-circle me-1"></i>
                        Add Question

                    </button>

                </div>


            </form>

        </div>

    </div>

</div>


<!-- ================= STYLE ================= -->
<style>

.erp-panel {
    background: #fff;
    border-radius: 18px;
    border: 1px solid #edf1f7;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    overflow: hidden;
}

.erp-panel-header {
    padding: 18px 22px;
    border-bottom: 1px solid #edf1f7;
    background: linear-gradient(135deg, #ffffff, #f8fbff);
}

.erp-panel-body {
    padding: 22px;
}

.form-control,
.form-select {
    border-radius: 10px;
    padding: 10px 12px;
}

.form-control:focus,
.form-select:focus {
    box-shadow: 0 0 0 0.2rem rgba(13,110,253,.15);
    border-color: #0d6efd;
}

.btn {
    border-radius: 10px;
}

</style>
