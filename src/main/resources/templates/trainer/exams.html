<div class="container-fluid py-4">

    <!-- ================= HERO ================= -->

    <div class="exam-banner mb-4">

        <div>

            <h2 class="fw-bold mb-2">
                <i class="bi bi-journal-richtext me-2"></i>
                Exam Management
            </h2>

            <p class="mb-0">
                Create, publish and monitor all examinations
            </p>

        </div>

        <div class="exam-count">

            <h2 th:text="${#lists.size(exams)}">0</h2>

            <small>Total Exams</small>

        </div>

    </div>

    <!-- ================= STATS ================= -->

    <div class="row g-4 mb-4">

        <div class="col-lg-3 col-md-6">

            <div class="exam-stat-card">

                <div class="stat-icon blue">

                    <i class="bi bi-journal-check"></i>

                </div>

                <div>

                    <h3 th:text="${#lists.size(exams)}">0</h3>

                    <span>Total Exams</span>

                </div>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="exam-stat-card">

                <div class="stat-icon green">

                    <i class="bi bi-check-circle-fill"></i>

                </div>

                <div>

                    <h3>--</h3>

                    <span>Published</span>

                </div>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="exam-stat-card">

                <div class="stat-icon orange">

                    <i class="bi bi-pencil-square"></i>

                </div>

                <div>

                    <h3>--</h3>

                    <span>Draft</span>

                </div>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="exam-stat-card">

                <div class="stat-icon purple">

                    <i class="bi bi-people-fill"></i>

                </div>

                <div>

                    <h3>--</h3>

                    <span>Total Attempts</span>

                </div>

            </div>

        </div>

    </div>

    <!-- ================= TOOLBAR ================= -->

    <div class="exam-toolbar mb-4">

        <div class="search-box">

            <i class="bi bi-search"></i>

            <input
                    id="examSearch"
                    class="form-control"
                    placeholder="Search Exam...">

        </div>

        <a th:href="@{/trainer/exams/create}"
           class="btn btn-primary">

            <i class="bi bi-plus-circle me-2"></i>

            Create Exam

        </a>

    </div>

    <!-- ================= EXAM GRID ================= -->

    <div class="row g-4">

        <div class="col-lg-6"

             th:each="e : ${exams}">

            <div class="exam-card">

                <!-- HEADER -->

                <div class="exam-card-header">

                    <div>

                        <h4 class="fw-bold mb-1"

                            th:text="${e.title}">

                            Java Test

                        </h4>

                        <span class="exam-batch"

                              th:text="${e.batch.name}">

                            Batch

                        </span>

                    </div>

                    <div>

                        <span th:if="${e.published}"

                              class="status-success">

                            Published

                        </span>

                        <span th:unless="${e.published}"

                              class="status-warning">

                            Draft

                        </span>

                    </div>

                </div>

                <!-- BODY -->

                <div class="exam-details">

                    <div>

                        <small>Duration</small>

                        <h6 th:text="${e.durationMinutes + ' min'}"></h6>

                    </div>

                    <div>

                        <small>Marks</small>

                        <h6 th:text="${e.totalMarks}"></h6>

                    </div>

                    <div>

                        <small>Questions</small>

                        <h6 th:text="${#lists.size(e.questions)}"></h6>

                    </div>

                    <div>

                        <small>Attempts</small>

                        <h6 th:text="${e.attemptCount}"></h6>

                    </div>

                </div>

                <!-- DATES -->

                <div class="exam-dates">

                    <div>

                        <i class="bi bi-calendar-event"></i>

                        <span th:text="${#temporals.format(e.startDate,'dd MMM yyyy')}"></span>

                    </div>

                    <div>

                        <i class="bi bi-calendar-check"></i>

                        <span th:text="${#temporals.format(e.endDate,'dd MMM yyyy')}"></span>

                    </div>

                </div>

                <!-- ACTIONS -->

                <div class="exam-actions">

                    <a th:href="@{/trainer/exams/{id}/questions(id=${e.id})}"

                       class="btn btn-outline-primary">

                        <i class="bi bi-list-check"></i>

                        Questions

                    </a>

                    <a th:href="@{/trainer/exams/{id}/analytics(id=${e.id})}"

                       class="btn btn-success">

                        <i class="bi bi-graph-up"></i>

                        Analytics

                    </a>

                    <a th:href="@{/trainer/exams/{id}/edit(id=${e.id})}"

                       class="btn btn-warning text-white">

                        <i class="bi bi-pencil-square"></i>

                    </a>

                    <form th:if="${!e.published}"

                          th:action="@{/trainer/exams/{id}/publish(id=${e.id})}"

                          method="post">

                        <button class="btn btn-primary">

                            Publish

                        </button>

                    </form>

                    <form th:if="${e.published}"

                          th:action="@{/trainer/exams/{id}/unpublish(id=${e.id})}"

                          method="post">

                        <button class="btn btn-danger">

                            Unpublish

                        </button>

                    </form>

                </div>

            </div>

        </div>

        <!-- EMPTY -->

        <div class="col-12"

             th:if="${#lists.isEmpty(exams)}">

            <div class="empty-card">

                <i class="bi bi-journal-x display-2"></i>

                <h3>No Exams Available</h3>

                <p>Create your first exam to get started.</p>

            </div>

        </div>

    </div>

</div>
<style>
	/*=========================================================
	                    PAGE
	=========================================================*/

	body{
	    background:#f4f7fb;
	    font-family:'Poppins',sans-serif;
	}

	/*=========================================================
	                    HERO
	=========================================================*/

	.exam-banner{

	    background:linear-gradient(135deg,#2563eb,#4f46e5);

	    color:#fff;

	    border-radius:24px;

	    padding:30px 35px;

	    display:flex;

	    justify-content:space-between;

	    align-items:center;

	    box-shadow:0 20px 40px rgba(37,99,235,.22);

	}

	.exam-banner h2{

	    font-weight:700;

	}

	.exam-banner p{

	    opacity:.9;

	}

	.exam-count{

	    width:120px;

	    height:120px;

	    border-radius:50%;

	    background:rgba(255,255,255,.15);

	    display:flex;

	    flex-direction:column;

	    justify-content:center;

	    align-items:center;

	    backdrop-filter:blur(10px);

	}

	.exam-count h2{

	    margin:0;

	    font-size:34px;

	    font-weight:700;

	}

	/*=========================================================
	                    STATS
	=========================================================*/

	.exam-stat-card{

	    background:#fff;

	    border-radius:20px;

	    padding:24px;

	    display:flex;

	    gap:18px;

	    align-items:center;

	    box-shadow:0 8px 25px rgba(15,23,42,.05);

	    transition:.35s;

	}

	.exam-stat-card:hover{

	    transform:translateY(-8px);

	    box-shadow:0 20px 40px rgba(37,99,235,.12);

	}

	.stat-icon{

	    width:65px;

	    height:65px;

	    border-radius:18px;

	    display:flex;

	    justify-content:center;

	    align-items:center;

	    color:#fff;

	    font-size:28px;

	}

	.blue{

	    background:linear-gradient(135deg,#2563eb,#60a5fa);

	}

	.green{

	    background:linear-gradient(135deg,#16a34a,#22c55e);

	}

	.orange{

	    background:linear-gradient(135deg,#ea580c,#fb923c);

	}

	.purple{

	    background:linear-gradient(135deg,#7c3aed,#a855f7);

	}

	.exam-stat-card h3{

	    margin:0;

	    font-size:28px;

	    font-weight:700;

	}

	.exam-stat-card span{

	    color:#64748b;

	}

	/*=========================================================
	                    TOOLBAR
	=========================================================*/

	.exam-toolbar{

	    display:flex;

	    justify-content:space-between;

	    align-items:center;

	    gap:20px;

	}

	.search-box{

	    width:350px;

	    position:relative;

	}

	.search-box i{

	    position:absolute;

	    left:16px;

	    top:50%;

	    transform:translateY(-50%);

	    color:#94a3b8;

	}

	.search-box input{

	    border-radius:50px;

	    padding-left:45px;

	    height:48px;

	    border:none;

	    box-shadow:0 8px 18px rgba(0,0,0,.06);

	}

	.search-box input:focus{

	    box-shadow:0 0 0 .2rem rgba(37,99,235,.15);

	}

	/*=========================================================
	                    EXAM CARD
	=========================================================*/

	.exam-card{

	    background:#fff;

	    border-radius:22px;

	    padding:24px;

	    box-shadow:0 10px 30px rgba(15,23,42,.05);

	    border:1px solid #edf2f7;

	    transition:.35s;

	    height:100%;

	}

	.exam-card:hover{

	    transform:translateY(-8px);

	    box-shadow:0 22px 45px rgba(37,99,235,.15);

	}

	/*=========================================================
	                    HEADER
	=========================================================*/

	.exam-card-header{

	    display:flex;

	    justify-content:space-between;

	    align-items:center;

	    margin-bottom:22px;

	}

	.exam-batch{

	    background:#eff6ff;

	    color:#2563eb;

	    padding:6px 14px;

	    border-radius:30px;

	    font-size:13px;

	    font-weight:600;

	}

	/*=========================================================
	                    STATUS
	=========================================================*/

	.status-success{

	    background:#dcfce7;

	    color:#15803d;

	    padding:8px 16px;

	    border-radius:30px;

	    font-size:13px;

	    font-weight:600;

	}

	.status-warning{

	    background:#fef3c7;

	    color:#92400e;

	    padding:8px 16px;

	    border-radius:30px;

	    font-size:13px;

	    font-weight:600;

	}

	/*=========================================================
	                    DETAILS
	=========================================================*/

	.exam-details{

	    display:grid;

	    grid-template-columns:repeat(4,1fr);

	    gap:15px;

	    padding:20px 0;

	    border-top:1px solid #edf2f7;

	    border-bottom:1px solid #edf2f7;

	}

	.exam-details small{

	    display:block;

	    color:#94a3b8;

	    text-transform:uppercase;

	    font-size:11px;

	    letter-spacing:1px;

	}

	.exam-details h6{

	    margin-top:8px;

	    font-size:17px;

	    font-weight:700;

	}

	/*=========================================================
	                    DATES
	=========================================================*/

	.exam-dates{

	    margin:20px 0;

	}

	.exam-dates div{

	    display:flex;

	    gap:10px;

	    align-items:center;

	    margin-bottom:12px;

	    color:#475569;

	}

	.exam-dates i{

	    color:#2563eb;

	}

	/*=========================================================
	                    ACTIONS
	=========================================================*/

	.exam-actions{

	    display:flex;

	    flex-wrap:wrap;

	    gap:10px;

	}

	.exam-actions .btn{

	    border-radius:12px;

	    font-weight:600;

	}

	.exam-actions .btn-primary{

	    background:linear-gradient(135deg,#2563eb,#4f46e5);

	    border:none;

	}

	.exam-actions .btn-success{

	    background:linear-gradient(135deg,#16a34a,#22c55e);

	    border:none;

	}

	.exam-actions .btn-warning{

	    border:none;

	}

	.exam-actions .btn-danger{

	    border:none;

	}

	/*=========================================================
	                    EMPTY
	=========================================================*/

	.empty-card{

	    background:#fff;

	    border-radius:24px;

	    padding:70px;

	    text-align:center;

	    box-shadow:0 10px 30px rgba(0,0,0,.05);

	}

	.empty-card i{

	    color:#cbd5e1;

	}

	/*=========================================================
	                    MOBILE
	=========================================================*/

	@media(max-width:992px){

	.exam-banner{

	flex-direction:column;

	gap:25px;

	text-align:center;

	}

	.exam-toolbar{

	flex-direction:column;

	}

	.search-box{

	width:100%;

	}

	.exam-details{

	grid-template-columns:repeat(2,1fr);

	}

	}

	@media(max-width:768px){

	.exam-card-header{

	flex-direction:column;

	align-items:flex-start;

	gap:15px;

	}

	.exam-details{

	grid-template-columns:1fr;

	}

	.exam-actions{

	flex-direction:column;

	}

	.exam-actions .btn{

	width:100%;

	}

	}
	/*=========================================================
	                PREMIUM ANIMATIONS
	=========================================================*/

	.exam-card{

	    position:relative;

	    overflow:hidden;

	    animation:fadeUp .5s ease;

	}

	.exam-card::before{

	    content:"";

	    position:absolute;

	    width:220px;

	    height:220px;

	    right:-120px;

	    top:-120px;

	    border-radius:50%;

	    background:rgba(37,99,235,.05);

	    transition:.4s;

	}

	.exam-card:hover::before{

	    transform:scale(1.3);

	}

	.exam-card:hover{

	    transform:translateY(-8px);

	}

	/*=========================================================
	                    BUTTONS
	=========================================================*/

	.exam-actions .btn{

	    transition:.3s;

	    font-weight:600;

	}

	.exam-actions .btn:hover{

	    transform:translateY(-3px);

	    box-shadow:0 10px 18px rgba(0,0,0,.12);

	}

	/*=========================================================
	                DETAILS HOVER
	=========================================================*/

	.exam-details>div{

	    padding:12px;

	    border-radius:12px;

	    transition:.3s;

	}

	.exam-details>div:hover{

	    background:#f8fafc;

	    transform:translateY(-3px);

	}

	/*=========================================================
	                    DATE
	=========================================================*/

	.exam-dates div{

	    padding:8px;

	    border-radius:10px;

	    transition:.3s;

	}

	.exam-dates div:hover{

	    background:#f8fafc;

	    transform:translateX(5px);

	}

	/*=========================================================
	                    STATUS
	=========================================================*/

	.status-success{

	    box-shadow:0 8px 18px rgba(34,197,94,.20);

	}

	.status-warning{

	    box-shadow:0 8px 18px rgba(245,158,11,.20);

	}

	/*=========================================================
	                    SEARCH
	=========================================================*/

	.search-box input{

	    transition:.35s;

	}

	.search-box input:focus{

	    transform:scale(1.02);

	}

	/*=========================================================
	                    CREATE BUTTON
	=========================================================*/

	.exam-toolbar .btn-primary{

	    background:linear-gradient(135deg,#2563eb,#4f46e5);

	    border:none;

	    border-radius:14px;

	    padding:12px 24px;

	    transition:.3s;

	}

	.exam-toolbar .btn-primary:hover{

	    transform:translateY(-3px);

	    box-shadow:0 15px 25px rgba(37,99,235,.25);

	}

	/*=========================================================
	                GLASS EFFECT
	=========================================================*/

	.exam-banner{

	    backdrop-filter:blur(18px);

	}

	.exam-card{

	    backdrop-filter:blur(12px);

	}

	/*=========================================================
	                    SCROLLBAR
	=========================================================*/

	::-webkit-scrollbar{

	    width:8px;

	}

	::-webkit-scrollbar-track{

	    background:#eef2f7;

	}

	::-webkit-scrollbar-thumb{

	    background:#cbd5e1;

	    border-radius:20px;

	}

	::-webkit-scrollbar-thumb:hover{

	    background:#94a3b8;

	}

	/*=========================================================
	                FADE ANIMATION
	=========================================================*/

	@keyframes fadeUp{

	    from{

	        opacity:0;

	        transform:translateY(25px);

	    }

	    to{

	        opacity:1;

	        transform:translateY(0);

	    }

	}

	/*=========================================================
	                ICON ANIMATION
	=========================================================*/

	.stat-icon{

	    transition:.35s;

	}

	.exam-stat-card:hover .stat-icon{

	    transform:rotate(-10deg) scale(1.08);

	}

	/*=========================================================
	                TITLE ANIMATION
	=========================================================*/

	.exam-card h4{

	    transition:.3s;

	}

	.exam-card:hover h4{

	    color:#2563eb;

	}

	/*=========================================================
	                RIPPLE EFFECT
	=========================================================*/

	.exam-card::after{

	    content:"";

	    position:absolute;

	    inset:0;

	    background:linear-gradient(120deg,
	            transparent,
	            rgba(255,255,255,.25),
	            transparent);

	    transform:translateX(-120%);

	}

	.exam-card:hover::after{

	    transition:.8s;

	    transform:translateX(120%);

	}
</style>
