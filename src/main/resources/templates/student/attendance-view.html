<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: body}"></div>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: body}"></div>

    <div class="p-4 w-100">
        <h3>My Attendance</h3>

        <table class="table table-bordered">
            <thead class="table-dark">
            <tr>
                <th>Date</th>
                <th>Batch</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${attendanceList}">
                <td th:text="${a.attendanceDate}"></td>
                <td th:text="${a.batch.name}"></td>
                <td>
                    <span th:text="${a.present ? 'Present' : 'Absent'}"
                          th:classappend="${a.present ? 'text-success' : 'text-danger'}">
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
