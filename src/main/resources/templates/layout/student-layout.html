<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Student Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard/student-dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/profile/student-profile.css}">
    <link rel="stylesheet" th:href="@{/css/erp-ui.css}">
</head>

<body class="bg-light">

<!-- ================= HEADER ================= -->
<div th:replace="fragments/student-header :: body"></div>

<!-- ================= MAIN WRAPPER ================= -->
<div class="d-flex min-vh-100">

    <!-- ================= SIDEBAR ================= -->
    <aside class="student-sidebar shadow-sm">
        <div th:replace="fragments/student-sidebar :: body"></div>
    </aside>

    <!-- ================= CONTENT AREA ================= -->
    <main class="flex-grow-1 p-3 overflow-auto">

        <!-- Dynamic Page Content -->
        <div th:replace="${content}"></div>

    </main>

</div>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    let attendancePercentage = [[${attendancePercentage}]];
    let totalClasses = [[${totalClasses}]];
    let presentDays = [[${presentDays}]];
</script>

<script th:src="@{/js/dashboard/student-dashboard.js}"></script>

</body>
</html>
